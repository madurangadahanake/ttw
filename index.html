<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTW - Time to Work</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #f1c40f;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-size: 32px;
        }

        /* පුළුල් තිර සඳහා කන්ටේනරය විශාල කරන ලදී */
        .timer-container {
            background-color: #000000;
            border: 3px solid #333;
            border-radius: 25px;
            padding: 40px 50px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            max-width: 750px;
            width: 95%;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            color: #555;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .display {
            font-family: 'Digital Numbers', sans-serif;
            font-size: 85px; /* ප්‍රධාන ටයිමරය විශාල කරන ලදී */
            color: #ffffff;
            margin: 15px 0 30px 0;
            letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .inputs-section {
            margin: 25px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .inputs-section input {
            width: 80px;
            padding: 12px;
            background: #151515;
            border: 2px solid #444;
            color: #fff;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .inputs-section input:focus {
            border-color: #f1c40f;
            outline: none;
        }

        .controls button {
            background-color: #181818;
            color: #fff;
            border: 2px solid #555;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .controls button:hover {
            background-color: #f1c40f;
            color: #000;
            border-color: #f1c40f;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.4);
        }

        /* පහළ පැනලය වඩාත් ඉඩකඩ ඇතිව සහ විශාලව සකස් කරන ලදී */
        .status-panel {
            margin-top: 35px;
            background: #080808;
            padding: 25px;
            border-radius: 15px;
            border-left: 6px solid #f1c40f;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1c1c1c;
            padding-bottom: 10px;
        }

        .status-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .status-label {
            color: #aaa;
            font-size: 16px;
            font-weight: 500;
        }

        /* දත්ත සියල්ල ඩිජිටල් ෆොන්ට් එකෙන් ලොකුවට */
        .status-value {
            font-family: 'Digital Numbers', sans-serif;
            font-size: 28px;
            color: #ffffff;
            letter-spacing: 2px;
        }

        .status-row:nth-child(2) .status-value {
            color: #2ecc71; /* ගතවූ කාලය කොළ පාටින් */
        }

        .status-row:nth-child(3) {
            border-left-color: #e74c3c;
        }
        
        .status-row:nth-child(3) .status-value {
            color: #e74c3c; /* නැවතුණු කාලය රතු පාටින් */
            text-shadow: 0 0 5px rgba(231, 76, 60, 0.3);
        }
    </style>
</head>
<body>

    <h1>TTW - Time to Work</h1>

    <div class="timer-container">
        <div class="labels">
            <span>Hours</span>
            <span>Minutes</span>
            <span>Seconds</span>
        </div>
        
        <div class="display" id="timerDisplay">00:00:00</div>

        <div class="inputs-section" id="inputFields">
            <input type="number" id="hrs" placeholder="HH" min="0" max="99">
            <input type="number" id="mins" placeholder="MM" min="0" max="59">
            <input type="number" id="secs" placeholder="SS" min="0" max="59">
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startTimer()">Start</button>
            <button id="stopBtn" onclick="stopTimer()">Stop</button>
            <button id="resetBtn" onclick="resetTimer()">Reset</button>
        </div>

        <!-- අලුත් ලොකු ස්ටේටස් පැනලය -->
        <div class="status-panel">
            <div class="status-row">
                <span class="status-label">Target Time Set</span>
                <span class="status-value" id="targetStatus">00:00:00</span>
            </div>
            <div class="status-row">
                <span class="status-label">Total Elapsed Time (ගත වූ කාලය)</span>
                <span class="status-value" id="elapsedStatus">00:00:00</span>
            </div>
            <div class="status-row">
                <span class="status-label" style="color: #ef5350;">Total Stop Time (නතර කර සිටි කාලය)</span>
                <span class="status-value" id="stopStatus">00:00:00</span>
            </div>
        </div>
    </div>

    <script>
        let countdown;
        let stopCountUp;
        let totalSeconds = 0;
        let initialSeconds = 0;
        let totalStopSeconds = 0; 
        let isRunning = false;
        let isStopRunning = false; 

        const display = document.getElementById('timerDisplay');
        const targetStatus = document.getElementById('targetStatus');
        const elapsedStatus = document.getElementById('elapsedStatus');
        const stopStatus = document.getElementById('stopStatus');

        window.onload = function() {
            if(localStorage.getItem('ttw_remaining')) {
                totalSeconds = parseInt(localStorage.getItem('ttw_remaining'));
                initialSeconds = parseInt(localStorage.getItem('ttw_initial'));
                totalStopSeconds = parseInt(localStorage.getItem('ttw_stop_seconds')) || 0;
                
                updateDisplay(totalSeconds);
                updateStatusPanels();

                if(localStorage.getItem('ttw_is_stopped') === 'true') {
                    runStopTimer();
                }
            }
        };

        function startTimer() {
            if (isRunning) return;
            
            clearInterval(stopCountUp);
            isStopRunning = false;
            localStorage.setItem('ttw_is_stopped', 'false');

            if (totalSeconds === 0) {
                const hrs = parseInt(document.getElementById('hrs').value) || 0;
                const mins = parseInt(document.getElementById('mins').value) || 0;
                const secs = parseInt(document.getElementById('secs').value) || 0;

                totalSeconds = (hrs * 3600) + (mins * 60) + secs;
                initialSeconds = totalSeconds;

                if (totalSeconds <= 0) {
                    alert("කරුණාකර වෙලාවක් ඇතුලත් කරන්න!");
                    return;
                }
            }

            isRunning = true;
            localStorage.setItem('ttw_initial', initialSeconds);
            
            countdown = setInterval(() => {
                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    isRunning = false;
                    alert("Time's Up!");
                    resetTimer();
                } else {
                    totalSeconds--;
                    localStorage.setItem('ttw_remaining', totalSeconds);
                    updateDisplay(totalSeconds);
                    updateStatusPanels();
                }
            }, 1000);
        }

        function stopTimer() {
            if (isRunning || (!isRunning && totalSeconds > 0 && !isStopRunning)) {
                clearInterval(countdown);
                isRunning = false;
                runStopTimer();
            }
        }

        function runStopTimer() {
            if(isStopRunning) return;
            isStopRunning = true;
            localStorage.setItem('ttw_is_stopped', 'true');

            stopCountUp = setInterval(() => {
                totalStopSeconds++;
                localStorage.setItem('ttw_stop_seconds', totalStopSeconds);
                updateStatusPanels();
            }, 1000);
        }

        function resetTimer() {
            clearInterval(countdown);
            clearInterval(stopCountUp);
            isRunning = false;
            isStopRunning = false;
            totalSeconds = 0;
            initialSeconds = 0;
            totalStopSeconds = 0;
            
            localStorage.removeItem('ttw_remaining');
            localStorage.removeItem('ttw_initial');
            localStorage.removeItem('ttw_stop_seconds');
            localStorage.setItem('ttw_is_stopped', 'false');

            display.textContent = "00:00:00";
            targetStatus.textContent = "00:00:00";
            elapsedStatus.textContent = "00:00:00";
            stopStatus.textContent = "00:00:00";
            
            document.getElementById('hrs').value = '';
            document.getElementById('mins').value = '';
            document.getElementById('secs').value = '';
        }

        function updateDisplay(secs) {
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            display.textContent = `${h}:${m}:${s}`;
        }

        function formatTime(secs) {
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateStatusPanels() {
            targetStatus.textContent = formatTime(initialSeconds);
            const elapsed = initialSeconds - totalSeconds;
            elapsedStatus.textContent = formatTime(elapsed);
            stopStatus.textContent = formatTime(totalStopSeconds);
        }
    </script>
</body>
</html>
