<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTW - Time to Work</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #020208;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .space-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 50% 50%, rgba(155, 89, 182, 0.05), transparent 70%),
                        radial-gradient(circle at 20% 80%, rgba(41, 128, 185, 0.05), transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(28px, 5vw, 38px);
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #ff007f, #00f0ff, #7000ff, #ff007f);
            background-size: 300% 100%;
            animation: rgbText 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.2));
            will-change: background-position;
        }

        @keyframes rgbText {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .timer-container {
            background: rgba(10, 10, 20, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: clamp(20px, 5vw, 40px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 650px;
            width: 100%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
        }

        .timer-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            right: 15%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, #ff007f, transparent);
        }

        .fade-element {
            transition: opacity 0.3s ease-in-out;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .labels {
            display: flex;
            justify-content: space-around;
            color: rgba(255, 255, 255, 0.3);
            font-size: clamp(10px, 2.5vw, 13px);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .display {
            font-family: 'Digital Numbers', sans-serif;
            font-size: clamp(45px, 12vw, 80px);
            color: #ffffff;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .inputs-section {
            margin: 25px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .inputs-section input {
            width: clamp(65px, 18vw, 85px);
            padding: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 10px;
            text-align: center;
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .inputs-section input:focus {
            border-color: #00f0ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            outline: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .controls button {
            background-color: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 35px;
            font-size: clamp(14px, 4vw, 16px);
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 100px;
            max-width: 160px;
        }

        .controls button:hover {
            background-color: rgba(0, 240, 255, 0.15);
            color: #00f0ff;
            border-color: #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        #stopBtn:hover {
            background-color: rgba(255, 0, 127, 0.15);
            border-color: #ff007f;
            color: #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
        }

        #resetBtn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #aaa;
            color: #fff;
        }

        .status-panel {
            margin-top: 30px;
            background: rgba(5, 5, 10, 0.8);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #00f0ff;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 8px;
        }

        .status-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .status-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(12px, 3.5vw, 14px);
        }

        .status-value {
            font-family: 'Digital Numbers', sans-serif;
            font-size: clamp(18px, 5vw, 24px);
            color: #ffffff;
            letter-spacing: 1px;
        }

        .status-row:nth-child(2) .status-value {
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .status-row:nth-child(3) .status-value {
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>
    <div class="space-glow"></div>

    <h1>TTW - Time to Work</h1>

    <div class="timer-container">
        
        <!-- SETUP MODE -->
        <div id="setupMode" class="fade-element">
            <h2 style="color: rgba(255,255,255,0.3); font-size: 14px; margin-bottom: 5px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase;">Set Target Time</h2>
            <div class="inputs-section">
                <input type="number" id="hrs" placeholder="HH" min="0" max="99" oninput="validity.valid||(value='');">
                <input type="number" id="mins" placeholder="MM" min="0" max="59" oninput="validity.valid||(value='');">
                <input type="number" id="secs" placeholder="SS" min="0" max="59" oninput="validity.valid||(value='');">
            </div>
            <div class="controls">
                <button id="startInitialBtn" onclick="startTimer()" style="max-width: 200px;">Start Timer</button>
            </div>
        </div>

        <!-- ACTIVE MODE -->
        <div id="activeMode" class="fade-element hidden">
            <div class="labels">
                <span>Hours</span>
                <span>Minutes</span>
                <span>Seconds</span>
            </div>
            
            <div class="display" id="timerDisplay">00:00:00</div>

            <div class="controls">
                <button id="startBtn" onclick="startTimer()">Start</button>
                <button id="stopBtn" onclick="stopTimer()">Stop</button>
                <button id="resetBtn" onclick="resetTimer()">Reset</button>
            </div>

            <div class="status-panel">
                <div class="status-row">
                    <span class="status-label">Target Time Set</span>
                    <span class="status-value" id="targetStatus">00:00:00</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Total Elapsed Time</span>
                    <span class="status-value" id="elapsedStatus">00:00:00</span>
                </div>
                <div class="status-row">
                    <span class="status-label" style="color: #ff007f;">Total Stop Time</span>
                    <span class="status-value" id="stopStatus">00:00:00</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- OPTIMIZED CANVAS STARFIELD ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Performance tweak

        let stars = [];
        const rgbColors = ['rgba(0,240,255,', 'rgba(255,0,127,', 'rgba(112,0,255,', 'rgba(0,255,204,', 'rgba(255,255,255,'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            // Screen Size එක අනුව තරු ගණන සකසනවා (Mobile වලදී smooth වෙන්න)
            const numStars = canvas.width < 600 ? 60 : 120; 
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5 + 0.5,
                    color: rgbColors[Math.floor(Math.random() * rgbColors.length)],
                    alpha: Math.random(),
                    speed: Math.random() * 0.01 + 0.005
                });
            }
        }

        function animateStars() {
            // Fill background solid first since alpha is false (highly optimized)
            ctx.fillStyle = '#020208';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0.1) s.speed = -s.speed;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = s.color + Math.max(0.1, s.alpha) + ')';
                ctx.fill();
            }
            requestAnimationFrame(animateStars);
        }

        // Debounce resize to prevent lag
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resizeCanvas, 150);
        });

        resizeCanvas();
        animateStars();


        // --- TIMER CORE LOGIC ---
        let countdown, stopCountUp;
        let totalSeconds = 0, initialSeconds = 0, totalStopSeconds = 0; 
        let isRunning = false, isStopRunning = false; 

        const display = document.getElementById('timerDisplay');
        const targetStatus = document.getElementById('targetStatus');
        const elapsedStatus = document.getElementById('elapsedStatus');
        const stopStatus = document.getElementById('stopStatus');
        const setupMode = document.getElementById('setupMode');
        const activeMode = document.getElementById('activeMode');

        window.onload = function() {
            if(localStorage.getItem('ttw_remaining')) {
                totalSeconds = parseInt(localStorage.getItem('ttw_remaining')) || 0;
                initialSeconds = parseInt(localStorage.getItem('ttw_initial')) || 0;
                totalStopSeconds = parseInt(localStorage.getItem('ttw_stop_seconds')) || 0;
                
                switchToActiveMode();
                updateDisplay(totalSeconds);
                updateStatusPanels();

                if(localStorage.getItem('ttw_is_stopped') === 'true') {
                    runStopTimer();
                }
            }
        };

        function switchToActiveMode() {
            setupMode.classList.add('hidden');
            activeMode.classList.remove('hidden');
        }

        function switchToSetupMode() {
            activeMode.classList.add('hidden');
            setupMode.classList.remove('hidden');
        }

        function startTimer() {
            if (isRunning) return;
            
            clearInterval(stopCountUp);
            isStopRunning = false;
            localStorage.setItem('ttw_is_stopped', 'false');

            if (totalSeconds === 0) {
                const hrs = Math.max(0, parseInt(document.getElementById('hrs').value) || 0);
                const mins = Math.max(0, Math.min(59, parseInt(document.getElementById('mins').value) || 0));
                const secs = Math.max(0, Math.min(59, parseInt(document.getElementById('secs').value) || 0));

                totalSeconds = (hrs * 3600) + (mins * 60) + secs;
                initialSeconds = totalSeconds;

                if (totalSeconds <= 0) {
                    alert("කරුණාකර වලංගු කාලයක් ඇතුලත් කරන්න!");
                    return;
                }
            }

            switchToActiveMode();
            isRunning = true;
            localStorage.setItem('ttw_initial', initialSeconds);
            
            countdown = setInterval(() => {
                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    isRunning = false;
                    alert("Time's Up!");
                    resetTimer();
                } else {
                    totalSeconds--;
                    localStorage.setItem('ttw_remaining', totalSeconds);
                    updateDisplay(totalSeconds);
                    updateStatusPanels();
                }
            }, 1000);
        }

        function stopTimer() {
            if (isRunning || (!isRunning && totalSeconds > 0 && !isStopRunning)) {
                clearInterval(countdown);
                isRunning = false;
                runStopTimer();
            }
        }

        function runStopTimer() {
            if(isStopRunning) return;
            isStopRunning = true;
            localStorage.setItem('ttw_is_stopped', 'true');

            stopCountUp = setInterval(() => {
                totalStopSeconds++;
                localStorage.setItem('ttw_stop_seconds', totalStopSeconds);
                updateStatusPanels();
            }, 1000);
        }

        function resetTimer() {
            clearInterval(countdown);
            clearInterval(stopCountUp);
            isRunning = false;
            isStopRunning = false;
            totalSeconds = 0;
            initialSeconds = 0;
            totalStopSeconds = 0;
            
            localStorage.clear(); // Clear all app data safely

            display.textContent = "00:00:00";
            targetStatus.textContent = "00:00:00";
            elapsedStatus.textContent = "00:00:00";
            stopStatus.textContent = "00:00:00";
            
            document.getElementById('hrs').value = '';
            document.getElementById('mins').value = '';
            document.getElementById('secs').value = '';

            switchToSetupMode();
        }

        function formatTime(secs) {
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateDisplay(secs) {
            display.textContent = formatTime(secs);
        }

        function updateStatusPanels() {
            targetStatus.textContent = formatTime(initialSeconds);
            elapsedStatus.textContent = formatTime(initialSeconds - totalSeconds);
            stopStatus.textContent = formatTime(totalStopSeconds);
        }
    </script>
</body>
</html>
