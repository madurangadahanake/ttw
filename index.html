<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTW - Time to Work</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #020208;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 30px 20px;
            overflow-x: hidden;
            position: relative;
            transition: background 0.8s ease;
        }

        /* --- BACKGROUND THEMES & ANIMATIONS --- */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .ambient-overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
            transition: all 0.8s ease;
        }

        /* Theme 1: Deep Space Glow */
        body.theme-space .ambient-overlay {
            background: radial-gradient(circle at 50% 50%, rgba(155, 89, 182, 0.08), transparent 70%),
                        radial-gradient(circle at 20% 80%, rgba(41, 128, 185, 0.08), transparent 60%);
        }

        /* Theme 2: Cyber Neon Orbs */
        body.theme-cyber {
            background-color: #050512;
        }
        body.theme-cyber .ambient-overlay {
            background: radial-gradient(circle at 80% 20%, rgba(0, 240, 255, 0.12), transparent 50%),
                        radial-gradient(circle at 10% 90%, rgba(255, 0, 127, 0.12), transparent 50%);
        }

        /* Theme 3: Aurora Flow */
        body.theme-aurora {
            background-color: #020b14;
        }
        body.theme-aurora .ambient-overlay {
            background: radial-gradient(circle at 50% 0%, rgba(0, 255, 204, 0.15), transparent 60%),
                        radial-gradient(circle at 100% 100%, rgba(0, 153, 255, 0.1), transparent 50%);
        }

        /* Theme 4: Minimal Dark */
        body.theme-minimal {
            background-color: #000000;
        }
        body.theme-minimal .ambient-overlay {
            background: none;
        }

        /* TOP BAR */
        .top-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .top-bar-right {
            display: flex;
            gap: 10px;
        }

        .local-clock {
            font-size: 15px;
            letter-spacing: 1px;
            color: rgba(0, 240, 255, 0.9);
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(0, 240, 255, 0.25);
            backdrop-filter: blur(5px);
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .icon-btn:hover {
            background: rgba(0, 240, 255, 0.2);
            border-color: #00f0ff;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
        }

        h1 {
            font-size: clamp(32px, 4vw, 48px);
            letter-spacing: 6px;
            margin-top: 50px;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #ff007f, #00f0ff, #7000ff, #ff007f);
            background-size: 300% 100%;
            animation: rgbText 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.3));
        }

        @keyframes rgbText {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .timer-container {
            background: rgba(10, 10, 20, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: clamp(25px, 4vw, 45px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            max-width: 1400px;
            width: 95%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
        }

        .timer-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, #ff007f, transparent);
        }

        .fade-element {
            transition: opacity 0.3s ease-in-out;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        /* SETUP MODE */
        .presets-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .preset-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ddd;
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: rgba(0, 240, 255, 0.15);
            border-color: #00f0ff;
            color: #00f0ff;
        }

        .inputs-section {
            margin: 20px 0 30px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .inputs-section input {
            width: clamp(80px, 12vw, 110px);
            padding: 15px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 12px;
            text-align: center;
            font-size: clamp(22px, 3vw, 32px);
            font-weight: bold;
        }

        .inputs-section input:focus {
            border-color: #00f0ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            outline: none;
        }

        /* DASHBOARD GRID */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 35px;
            align-items: center;
        }

        @media (min-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1.2fr 0.8fr;
            }
        }

        .timer-visual-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .stats-control-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
            width: 100%;
        }

        /* LINE PROGRESS */
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00f0ff, #00ffcc);
            box-shadow: 0 0 12px #00f0ff;
            border-radius: 10px;
            transition: width 0.3s linear;
        }

        .progress-bar-fill.overtime {
            background: linear-gradient(90deg, #ff007f, #ff5500);
            box-shadow: 0 0 12px #ff007f;
            width: 100% !important;
        }

        /* --- PERFECT CIRCULAR RING (NO CUT-OFF FIXED) --- */
        .ring-wrapper {
            position: relative;
            width: 100%;
            max-width: 520px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px; /* Safe Padding for Glow */
        }

        .ring-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            overflow: visible; /* Prevents SVG glow clipping */
        }

        .ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 7;
        }

        .ring-circle {
            fill: none;
            stroke: #00f0ff;
            stroke-width: 7;
            stroke-linecap: round;
            filter: drop-shadow(0 0 10px #00f0ff);
            transition: stroke-dashoffset 0.3s linear, stroke 0.5s ease;
        }

        .ring-circle.overtime {
            stroke: #ff007f;
            filter: drop-shadow(0 0 10px #ff007f);
        }

        .ring-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 20px;
        }

        .labels {
            display: flex;
            justify-content: space-around;
            width: 80%;
            color: rgba(255, 255, 255, 0.4);
            font-size: clamp(11px, 1.5vw, 14px);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .display {
            font-family: 'Digital Numbers', sans-serif;
            font-size: clamp(36px, 6vw, 64px);
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            white-space: nowrap;
        }

        .style-line .display {
            font-size: clamp(48px, 8vw, 90px);
            margin-bottom: 25px;
            text-align: center;
        }

        .display.overtime {
            color: #ff007f;
            text-shadow: 0 0 25px rgba(255, 0, 127, 0.6);
        }

        /* STATS CARDS */
        .status-cards-vertical {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .status-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 22px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease;
        }

        .status-card:hover {
            transform: translateY(-2px);
        }

        .status-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            border-radius: 4px 0 0 4px;
        }

        .card-target::before { background: #00f0ff; box-shadow: 0 0 10px #00f0ff; }
        .card-elapsed::before { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        .card-stopped::before { background: #ffaa00; box-shadow: 0 0 10px #ffaa00; }
        .card-overtime::before { background: #ff007f; box-shadow: 0 0 10px #ff007f; }

        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-icon {
            font-size: 18px;
            opacity: 0.8;
        }

        .status-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-value {
            font-family: 'Digital Numbers', sans-serif;
            font-size: clamp(20px, 2.2vw, 26px);
            color: #ffffff;
            letter-spacing: 2px;
        }

        .card-target .status-value { color: #ffffff; text-shadow: 0 0 8px rgba(255, 255, 255, 0.3); }
        .card-elapsed .status-value { color: #00ffcc; text-shadow: 0 0 12px rgba(0, 255, 204, 0.4); }
        .card-stopped .status-value { color: #ffaa00; text-shadow: 0 0 12px rgba(255, 170, 0, 0.4); }
        .card-overtime .status-value { color: #ff007f; text-shadow: 0 0 12px rgba(255, 0, 127, 0.5); }

        /* CONTROLS */
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            width: 100%;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 14px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #startBtn { border-color: rgba(0, 240, 255, 0.3); }
        #startBtn:hover {
            background: rgba(0, 240, 255, 0.15);
            color: #00f0ff;
            border-color: #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.35);
        }

        #stopBtn { border-color: rgba(255, 170, 0, 0.3); }
        #stopBtn:hover {
            background: rgba(255, 170, 0, 0.15);
            color: #ffaa00;
            border-color: #ffaa00;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.35);
        }

        #resetBtn { border-color: rgba(255, 255, 255, 0.12); }
        #resetBtn:hover {
            background: rgba(255, 0, 127, 0.15);
            color: #ff007f;
            border-color: #ff007f;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.35);
        }

    </style>
</head>
<body class="theme-space">

    <!-- ANIMATED BACKGROUND CANVAS & OVERLAY -->
    <canvas id="bgCanvas"></canvas>
    <div class="ambient-overlay"></div>

    <div class="top-bar">
        <div class="local-clock" id="localClock">00:00:00 AM</div>
        <div class="top-bar-right">
            <button class="icon-btn" onclick="cycleTheme()" id="themeBtn">🌌 Theme: Space</button>
            <button class="icon-btn" onclick="toggleStyle()" id="styleToggleBtn">🔄 Style: Ring</button>
            <button class="icon-btn" onclick="toggleFullScreen()">⛶ Fullscreen</button>
        </div>
    </div>

    <h1>TTW - Time to Work</h1>

    <div class="timer-container" id="timerContainer">
        
        <!-- SETUP MODE -->
        <div id="setupMode" class="fade-element">
            <h2 style="color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 15px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase; text-align: center;">Quick Presets</h2>
            
            <div class="presets-grid">
                <button class="preset-btn" onclick="setPreset(0, 15, 0)">15M</button>
                <button class="preset-btn" onclick="setPreset(0, 25, 0)">25M</button>
                <button class="preset-btn" onclick="setPreset(0, 50, 0)">50M</button>
                <button class="preset-btn" onclick="setPreset(1, 0, 0)">1H</button>
                <button class="preset-btn" onclick="setPreset(2, 0, 0)">2H</button>
                <button class="preset-btn" onclick="setPreset(3, 0, 0)">3H</button>
                <button class="preset-btn" onclick="setPreset(6, 0, 0)">6H</button>
            </div>

            <h2 style="color: rgba(255,255,255,0.3); font-size: 12px; margin-bottom: 10px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase; text-align: center;">Or Set Custom Target Time</h2>
            <div class="inputs-section">
                <input type="number" id="hrs" placeholder="HH" min="0" max="99" oninput="validity.valid||(value='');">
                <input type="number" id="mins" placeholder="MM" min="0" max="59" oninput="validity.valid||(value='');">
                <input type="number" id="secs" placeholder="SS" min="0" max="59" oninput="validity.valid||(value='');">
            </div>
            <div class="controls" style="max-width: 300px; margin: 0 auto;">
                <button id="startInitialBtn" onclick="startTimer()">Start Timer</button>
            </div>
        </div>

        <!-- ACTIVE DASHBOARD MODE -->
        <div id="activeMode" class="fade-element hidden">
            <div class="dashboard-grid">
                
                <!-- LEFT SIDE: TIMER VISUALIZATION -->
                <div class="timer-visual-side">
                    <!-- LINE VIEW -->
                    <div id="lineView" class="hidden" style="width: 100%;">
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" id="progressBar"></div>
                        </div>
                        <div class="labels" style="width: 100%;">
                            <span>Hours</span>
                            <span>Minutes</span>
                            <span>Seconds</span>
                        </div>
                        <div class="display" id="timerDisplayLine">00:00:00</div>
                    </div>

                    <!-- RING VIEW (EXACTLY FIXED RADIUS & VIEWBOX) -->
                    <div id="ringView" style="width: 100%;">
                        <div class="ring-wrapper">
                            <svg class="ring-svg" viewBox="0 0 220 220">
                                <circle class="ring-bg" cx="110" cy="110" r="95"></circle>
                                <circle class="ring-circle" id="ringCircle" cx="110" cy="110" r="95" stroke-dasharray="596.9" stroke-dashoffset="0"></circle>
                            </svg>
                            <div class="ring-content">
                                <div class="labels">
                                    <span>HRS</span>
                                    <span>MIN</span>
                                    <span>SEC</span>
                                </div>
                                <div class="display" id="timerDisplayRing">00:00:00</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT SIDE: STATS CARDS & CONTROLS -->
                <div class="stats-control-side">
                    <div class="status-cards-vertical">
                        <div class="status-card card-target">
                            <div class="status-info">
                                <span class="status-icon">🎯</span>
                                <span class="status-label">Target Time</span>
                            </div>
                            <span class="status-value" id="targetStatus">00:15:00</span>
                        </div>
                        
                        <div class="status-card card-elapsed">
                            <div class="status-info">
                                <span class="status-icon">⏱️</span>
                                <span class="status-label">Total Elapsed</span>
                            </div>
                            <span class="status-value" id="elapsedStatus">00:00:00</span>
                        </div>
                        
                        <div class="status-card card-stopped">
                            <div class="status-info">
                                <span class="status-icon">⏸️</span>
                                <span class="status-label">Total Paused</span>
                            </div>
                            <span class="status-value" id="stopStatus">00:00:00</span>
                        </div>
                        
                        <div class="status-card card-overtime hidden" id="overtimeCard">
                            <div class="status-info">
                                <span class="status-icon">⚠️</span>
                                <span class="status-label">Overtime</span>
                            </div>
                            <span class="status-value" id="overtimeStatus">+00:00:00</span>
                        </div>
                    </div>

                    <div class="controls">
                        <button id="startBtn" onclick="startTimer()">▶ Start</button>
                        <button id="stopBtn" onclick="togglePauseResume()">⏸ Pause</button>
                        <button id="resetBtn" onclick="resetTimer()">↺ Reset</button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        function updateLocalClock() {
            const now = new Date();
            document.getElementById('localClock').textContent = now.toLocaleTimeString();
        }
        setInterval(updateLocalClock, 1000);
        updateLocalClock();

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // --- BACKGROUND CANVAS ANIMATION ENGINE ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let currentThemeIndex = 0;
        const themes = [
            { id: 'theme-space', name: '🌌 Theme: Space' },
            { id: 'theme-cyber', name: '⚡ Theme: Cyber' },
            { id: 'theme-aurora', name: '🌊 Theme: Aurora' },
            { id: 'theme-minimal', name: '🖤 Theme: Minimal' }
        ];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        function initParticles() {
            particles = [];
            const count = canvas.width < 600 ? 50 : 120;
            const theme = themes[currentThemeIndex].id;

            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: theme === 'theme-cyber' ? Math.random() * 3 + 1 : Math.random() * 1.8 + 0.5,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.01 + 0.005,
                    color: getParticleColor(theme)
                });
            }
        }

        function getParticleColor(theme) {
            const spaceColors = ['rgba(0,240,255,', 'rgba(255,0,127,', 'rgba(112,0,255,', 'rgba(255,255,255,'];
            const cyberColors = ['rgba(0,240,255,', 'rgba(255,0,127,', 'rgba(255,230,0,'];
            const auroraColors = ['rgba(0,255,204,', 'rgba(0,153,255,', 'rgba(160,32,240,'];
            
            if (theme === 'theme-space') return spaceColors[Math.floor(Math.random() * spaceColors.length)];
            if (theme === 'theme-cyber') return cyberColors[Math.floor(Math.random() * cyberColors.length)];
            if (theme === 'theme-aurora') return auroraColors[Math.floor(Math.random() * auroraColors.length)];
            return 'rgba(255,255,255,';
        }

        function renderParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const currentTheme = themes[currentThemeIndex].id;

            if (currentTheme === 'theme-minimal') {
                requestAnimationFrame(renderParticles);
                return;
            }

            for (let p of particles) {
                p.alpha += p.speed;
                if (p.alpha > 1 || p.alpha < 0.1) p.speed = -p.speed;

                if (currentTheme === 'theme-cyber' || currentTheme === 'theme-aurora') {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color + Math.max(0.05, p.alpha) + ')';
                ctx.fill();
            }
            requestAnimationFrame(renderParticles);
        }

        function cycleTheme() {
            document.body.classList.remove(themes[currentThemeIndex].id);
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const newTheme = themes[currentThemeIndex];
            
            document.body.classList.add(newTheme.id);
            document.getElementById('themeBtn').textContent = newTheme.name;
            localStorage.setItem('ttw_theme_index', currentThemeIndex);
            
            initParticles();
        }

        window.addEventListener('resize', resizeCanvas);
        
        // Restore Theme
        const savedThemeIndex = localStorage.getItem('ttw_theme_index');
        if (savedThemeIndex !== null) {
            document.body.classList.remove('theme-space');
            currentThemeIndex = parseInt(savedThemeIndex);
            document.body.classList.add(themes[currentThemeIndex].id);
            document.getElementById('themeBtn').textContent = themes[currentThemeIndex].name;
        }

        resizeCanvas();
        renderParticles();

        // --- STYLE TOGGLE ENGINE ---
        let currentStyle = localStorage.getItem('ttw_style') || 'ring'; 
        const lineView = document.getElementById('lineView');
        const ringView = document.getElementById('ringView');
        const styleToggleBtn = document.getElementById('styleToggleBtn');
        const timerContainer = document.getElementById('timerContainer');

        function applyStyleUI() {
            if (currentStyle === 'line') {
                ringView.classList.add('hidden');
                lineView.classList.remove('hidden');
                timerContainer.classList.add('style-line');
                styleToggleBtn.textContent = '🔄 Style: Line';
            } else {
                lineView.classList.add('hidden');
                ringView.classList.remove('hidden');
                timerContainer.classList.remove('style-line');
                styleToggleBtn.textContent = '🔄 Style: Ring';
            }
        }

        function toggleStyle() {
            currentStyle = currentStyle === 'ring' ? 'line' : 'ring';
            localStorage.setItem('ttw_style', currentStyle);
            applyStyleUI();
            updateDisplay(isOvertime ? overtimeSeconds : currentSeconds);
        }

        // --- TIMER ENGINE ---
        let mainTimer, stopCountUp;
        let initialSeconds = 0, currentSeconds = 0, totalStopSeconds = 0, overtimeSeconds = 0; 
        let isRunning = false, isStopRunning = false, isOvertime = false; 

        const displayLine = document.getElementById('timerDisplayLine');
        const displayRing = document.getElementById('timerDisplayRing');
        const targetStatus = document.getElementById('targetStatus');
        const elapsedStatus = document.getElementById('elapsedStatus');
        const stopStatus = document.getElementById('stopStatus');
        const overtimeCard = document.getElementById('overtimeCard');
        const overtimeStatus = document.getElementById('overtimeStatus');
        const stopBtn = document.getElementById('stopBtn');
        const progressBar = document.getElementById('progressBar');
        const ringCircle = document.getElementById('ringCircle');
        const ringCircumference = 2 * Math.PI * 95; // Exact radius = 95
        
        const setupMode = document.getElementById('setupMode');
        const activeMode = document.getElementById('activeMode');

        window.onload = function() {
            applyStyleUI();

            if(localStorage.getItem('ttw_initial')) {
                initialSeconds = parseInt(localStorage.getItem('ttw_initial')) || 0;
                currentSeconds = parseInt(localStorage.getItem('ttw_current')) || 0;
                totalStopSeconds = parseInt(localStorage.getItem('ttw_stop_seconds')) || 0;
                isOvertime = localStorage.getItem('ttw_is_overtime') === 'true';
                overtimeSeconds = parseInt(localStorage.getItem('ttw_overtime_seconds')) || 0;
                
                switchToActiveMode();
                if (isOvertime) enableOvertimeUI();
                updateDisplay(isOvertime ? overtimeSeconds : currentSeconds);
                updateStatusPanels();

                if(localStorage.getItem('ttw_is_stopped') === 'true') {
                    runStopTimer();
                    updateStopButtonUI(true);
                }
            }
        };

        function setPreset(h, m, s) {
            document.getElementById('hrs').value = h || '';
            document.getElementById('mins').value = m || '';
            document.getElementById('secs').value = s || '';
            startTimer();
        }

        function switchToActiveMode() {
            setupMode.classList.add('hidden');
            activeMode.classList.remove('hidden');
        }

        function switchToSetupMode() {
            activeMode.classList.hidden;
            setupMode.classList.remove('hidden');
            activeMode.classList.add('hidden');
        }

        function startTimer() {
            if (isRunning) return;
            
            clearInterval(stopCountUp);
            isStopRunning = false;
            localStorage.setItem('ttw_is_stopped', 'false');
            updateStopButtonUI(false);

            if (currentSeconds === 0 && !isOvertime) {
                const hrs = Math.max(0, parseInt(document.getElementById('hrs').value) || 0);
                const mins = Math.max(0, Math.min(59, parseInt(document.getElementById('mins').value) || 0));
                const secs = Math.max(0, Math.min(59, parseInt(document.getElementById('secs').value) || 0));

                currentSeconds = (hrs * 3600) + (mins * 60) + secs;
                initialSeconds = currentSeconds;

                if (currentSeconds <= 0) {
                    alert("කරුණාකර වලංගු කාලයක් ඇතුලත් කරන්න!");
                    return;
                }
                localStorage.setItem('ttw_initial', initialSeconds);
            }

            switchToActiveMode();
            isRunning = true;
            
            mainTimer = setInterval(() => {
                if (!isOvertime) {
                    if (currentSeconds > 0) {
                        currentSeconds--;
                        localStorage.setItem('ttw_current', currentSeconds);
                        updateDisplay(currentSeconds);
                    } else {
                        isOvertime = true;
                        localStorage.setItem('ttw_is_overtime', 'true');
                        enableOvertimeUI();
                    }
                } 
                
                if (isOvertime) {
                    overtimeSeconds++;
                    localStorage.setItem('ttw_overtime_seconds', overtimeSeconds);
                    updateDisplay(overtimeSeconds);
                }

                updateStatusPanels();
            }, 1000);
        }

        function togglePauseResume() {
            if (isRunning) {
                clearInterval(mainTimer);
                isRunning = false;
                runStopTimer();
                updateStopButtonUI(true);
            } else if (isStopRunning) {
                startTimer();
            }
        }

        function updateStopButtonUI(isPaused) {
            if (isPaused) {
                stopBtn.textContent = "▶ Resume";
                stopBtn.style.borderColor = "#00ffcc";
                stopBtn.style.color = "#00ffcc";
            } else {
                stopBtn.textContent = "⏸ Pause";
                stopBtn.style.borderColor = "rgba(255, 170, 0, 0.3)";
                stopBtn.style.color = "#fff";
            }
        }

        function runStopTimer() {
            if(isStopRunning) return;
            isStopRunning = true;
            localStorage.setItem('ttw_is_stopped', 'true');

            stopCountUp = setInterval(() => {
                totalStopSeconds++;
                localStorage.setItem('ttw_stop_seconds', totalStopSeconds);
                updateStatusPanels();
            }, 1000);
        }

        function resetTimer() {
            clearInterval(mainTimer);
            clearInterval(stopCountUp);
            isRunning = false;
            isStopRunning = false;
            isOvertime = false;
            
            currentSeconds = 0;
            initialSeconds = 0;
            totalStopSeconds = 0;
            overtimeSeconds = 0;
            
            localStorage.clear();
            localStorage.setItem('ttw_style', currentStyle);
            localStorage.setItem('ttw_theme_index', currentThemeIndex);

            displayLine.classList.remove('overtime');
            displayRing.classList.remove('overtime');
            overtimeCard.classList.add('hidden');
            
            progressBar.classList.remove('overtime');
            progressBar.style.width = "100%";

            ringCircle.classList.remove('overtime');
            ringCircle.style.strokeDashoffset = "0";

            displayLine.textContent = "00:00:00";
            displayRing.textContent = "00:00:00";
            targetStatus.textContent = "00:00:00";
            elapsedStatus.textContent = "00:00:00";
            stopStatus.textContent = "00:00:00";
            overtimeStatus.textContent = "+00:00:00";
            
            document.getElementById('hrs').value = '';
            document.getElementById('mins').value = '';
            document.getElementById('secs').value = '';

            updateStopButtonUI(false);
            switchToSetupMode();
        }

        function enableOvertimeUI() {
            displayLine.classList.add('overtime');
            displayRing.classList.add('overtime');
            overtimeCard.classList.remove('hidden');
            progressBar.classList.add('overtime');
            ringCircle.classList.add('overtime');
        }

        function formatTime(secs) {
            secs = Math.max(0, secs);
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateDisplay(secs) {
            const formatted = (isOvertime ? "+" : "") + formatTime(secs);
            displayLine.textContent = formatted;
            displayRing.textContent = formatted;
            
            if (!isOvertime && initialSeconds > 0) {
                const ratio = currentSeconds / initialSeconds;
                progressBar.style.width = `${ratio * 100}%`;

                const offset = ringCircumference - (ratio * ringCircumference);
                ringCircle.style.strokeDashoffset = offset;
            } else if (isOvertime) {
                ringCircle.style.strokeDashoffset = 0;
            }
        }

        function updateStatusPanels() {
            targetStatus.textContent = formatTime(initialSeconds);
            const elapsed = Math.max(0, (initialSeconds - currentSeconds) + overtimeSeconds);
            elapsedStatus.textContent = formatTime(elapsed);
            stopStatus.textContent = formatTime(totalStopSeconds);
            if (isOvertime) overtimeStatus.textContent = "+" + formatTime(overtimeSeconds);
        }
    </script>
</body>
</html>
