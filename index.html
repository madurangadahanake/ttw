<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTW - Time to Work</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #020208;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .space-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 50% 50%, rgba(155, 89, 182, 0.05), transparent 70%),
                        radial-gradient(circle at 20% 80%, rgba(41, 128, 185, 0.05), transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            max-width: 650px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .top-bar-right {
            display: flex;
            gap: 8px;
        }

        .local-clock {
            font-size: 14px;
            letter-spacing: 1px;
            color: rgba(0, 240, 255, 0.8);
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .icon-btn:hover {
            background: rgba(0, 240, 255, 0.2);
            border-color: #00f0ff;
        }

        h1 {
            font-size: clamp(28px, 5vw, 38px);
            letter-spacing: 4px;
            margin-top: 40px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #ff007f, #00f0ff, #7000ff, #ff007f);
            background-size: 300% 100%;
            animation: rgbText 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.2));
            will-change: background-position;
        }

        @keyframes rgbText {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .timer-container {
            background: rgba(10, 10, 20, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: clamp(20px, 5vw, 35px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 650px;
            width: 100%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
        }

        .timer-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            right: 15%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, #ff007f, transparent);
        }

        .fade-element {
            transition: opacity 0.3s ease-in-out;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .presets-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .preset-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ddd;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: rgba(0, 240, 255, 0.15);
            border-color: #00f0ff;
            color: #00f0ff;
        }

        /* --- STYLE 1: LINEAR PROGRESS BAR --- */
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00f0ff, #00ffcc);
            box-shadow: 0 0 12px #00f0ff;
            border-radius: 10px;
            transition: width 0.3s linear, background 0.5s ease;
        }

        .progress-bar-fill.overtime {
            background: linear-gradient(90deg, #ff007f, #ff5500);
            box-shadow: 0 0 12px #ff007f;
            width: 100% !important;
        }

        /* --- STYLE 2: CIRCULAR RING (LARGER & RESPONSIVE) --- */
        .ring-wrapper {
            position: relative;
            width: clamp(260px, 55vw, 340px);
            height: clamp(260px, 55vw, 340px);
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 8;
        }

        .ring-circle {
            fill: none;
            stroke: #00f0ff;
            stroke-width: 8;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px #00f0ff);
            transition: stroke-dashoffset 0.3s linear, stroke 0.5s ease, filter 0.5s ease;
        }

        .ring-circle.overtime {
            stroke: #ff007f;
            filter: drop-shadow(0 0 8px #ff007f);
        }

        .ring-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .labels {
            display: flex;
            justify-content: space-around;
            width: 80%;
            color: rgba(255, 255, 255, 0.3);
            font-size: clamp(9px, 2.2vw, 11px);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .display {
            font-family: 'Digital Numbers', sans-serif;
            font-size: clamp(30px, 7vw, 48px);
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transition: color 0.5s ease, text-shadow 0.5s ease;
        }

        /* Display Style adjustments when in Line mode */
        .style-line .display {
            font-size: clamp(45px, 11vw, 75px);
            margin-bottom: 25px;
        }
        .style-line .labels {
            width: 100%;
            font-size: clamp(10px, 2.5vw, 13px);
        }

        .display.overtime {
            color: #ff007f;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
        }

        .inputs-section {
            margin: 15px 0 25px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .inputs-section input {
            width: clamp(65px, 18vw, 85px);
            padding: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 10px;
            text-align: center;
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .inputs-section input:focus {
            border-color: #00f0ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            outline: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .controls button {
            background-color: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 25px;
            font-size: clamp(14px, 4vw, 16px);
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 90px;
            max-width: 150px;
        }

        .controls button:hover {
            background-color: rgba(0, 240, 255, 0.15);
            color: #00f0ff;
            border-color: #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        #stopBtn:hover {
            background-color: rgba(255, 0, 127, 0.15);
            border-color: #ff007f;
            color: #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
        }

        #resetBtn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #aaa;
            color: #fff;
        }

        .status-panel {
            margin-top: 25px;
            background: rgba(5, 5, 10, 0.8);
            padding: 15px 20px;
            border-radius: 15px;
            border-left: 4px solid #00f0ff;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-left-color 0.5s ease;
        }

        .status-panel.overtime-panel {
            border-left-color: #ff007f;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 6px;
        }

        .status-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .status-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(12px, 3.5vw, 13px);
        }

        .status-value {
            font-family: 'Digital Numbers', sans-serif;
            font-size: clamp(16px, 4.5vw, 20px);
            color: #ffffff;
            letter-spacing: 1px;
        }

        .status-row:nth-child(2) .status-value {
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .status-row:nth-child(3) .status-value {
            color: #ffaa00;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.3);
        }

        .status-row.overtime-row .status-value {
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>
    <div class="space-glow"></div>

    <div class="top-bar">
        <div class="local-clock" id="localClock">00:00:00 AM</div>
        <div class="top-bar-right">
            <button class="icon-btn" onclick="toggleStyle()" id="styleToggleBtn">🔄 Style: Ring</button>
            <button class="icon-btn" onclick="toggleFullScreen()">⛶ Fullscreen</button>
        </div>
    </div>

    <h1>TTW - Time to Work</h1>

    <div class="timer-container" id="timerContainer">
        
        <!-- SETUP MODE -->
        <div id="setupMode" class="fade-element">
            <h2 style="color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 10px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase;">Quick Presets</h2>
            
            <div class="presets-grid">
                <button class="preset-btn" onclick="setPreset(0, 15, 0)">15M</button>
                <button class="preset-btn" onclick="setPreset(0, 25, 0)">25M</button>
                <button class="preset-btn" onclick="setPreset(0, 50, 0)">50M</button>
                <button class="preset-btn" onclick="setPreset(1, 0, 0)">1H</button>
                <button class="preset-btn" onclick="setPreset(2, 0, 0)">2H</button>
                <button class="preset-btn" onclick="setPreset(3, 0, 0)">3H</button>
                <button class="preset-btn" onclick="setPreset(6, 0, 0)">6H</button>
            </div>

            <h2 style="color: rgba(255,255,255,0.3); font-size: 12px; margin-bottom: 5px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase;">Or Set Custom Target Time</h2>
            <div class="inputs-section">
                <input type="number" id="hrs" placeholder="HH" min="0" max="99" oninput="validity.valid||(value='');">
                <input type="number" id="mins" placeholder="MM" min="0" max="59" oninput="validity.valid||(value='');">
                <input type="number" id="secs" placeholder="SS" min="0" max="59" oninput="validity.valid||(value='');">
            </div>
            <div class="controls">
                <button id="startInitialBtn" onclick="startTimer()" style="max-width: 200px;">Start Timer</button>
            </div>
        </div>

        <!-- ACTIVE MODE -->
        <div id="activeMode" class="fade-element hidden">
            
            <!-- VIEW 1: LINEAR PROGRESS BAR -->
            <div id="lineView" class="hidden">
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="labels">
                    <span>Hours</span>
                    <span>Minutes</span>
                    <span>Seconds</span>
                </div>
                <div class="display" id="timerDisplayLine">00:00:00</div>
            </div>

            <!-- VIEW 2: CIRCULAR RING (LARGE) -->
            <div id="ringView">
                <div class="ring-wrapper">
                    <svg class="ring-svg" viewBox="0 0 200 200">
                        <circle class="ring-bg" cx="100" cy="100" r="90"></circle>
                        <circle class="ring-circle" id="ringCircle" cx="100" cy="100" r="90" stroke-dasharray="565.48" stroke-dashoffset="0"></circle>
                    </svg>
                    <div class="ring-content">
                        <div class="labels">
                            <span>HRS</span>
                            <span>MIN</span>
                            <span>SEC</span>
                        </div>
                        <div class="display" id="timerDisplayRing">00:00:00</div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="startBtn" onclick="startTimer()">Start</button>
                <button id="stopBtn" onclick="togglePauseResume()">Pause</button>
                <button id="resetBtn" onclick="resetTimer()">Reset</button>
            </div>

            <div class="status-panel" id="mainStatusPanel">
                <div class="status-row">
                    <span class="status-label">Target Time</span>
                    <span class="status-value" id="targetStatus">00:00:00</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Total Elapsed</span>
                    <span class="status-value" id="elapsedStatus">00:00:00</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Total Stopped / Paused</span>
                    <span class="status-value" id="stopStatus">00:00:00</span>
                </div>
                <div class="status-row overtime-row hidden" id="overtimeRow">
                    <span class="status-label">Overtime (අමතර කාලය)</span>
                    <span class="status-value" id="overtimeStatus">+00:00:00</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        function updateLocalClock() {
            const now = new Date();
            document.getElementById('localClock').textContent = now.toLocaleTimeString();
        }
        setInterval(updateLocalClock, 1000);
        updateLocalClock();

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // CANVAS STARFIELD
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let stars = [];
        const rgbColors = ['rgba(0,240,255,', 'rgba(255,0,127,', 'rgba(112,0,255,', 'rgba(0,255,204,', 'rgba(255,255,255,'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const numStars = canvas.width < 600 ? 60 : 120; 
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5 + 0.5,
                    color: rgbColors[Math.floor(Math.random() * rgbColors.length)],
                    alpha: Math.random(),
                    speed: Math.random() * 0.01 + 0.005
                });
            }
        }

        function animateStars() {
            ctx.fillStyle = '#020208';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0.1) s.speed = -s.speed;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = s.color + Math.max(0.1, s.alpha) + ')';
                ctx.fill();
            }
            requestAnimationFrame(animateStars);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animateStars();

        // STYLE TOGGLE SYSTEM (Ring / Line)
        let currentStyle = localStorage.getItem('ttw_style') || 'ring'; 
        const lineView = document.getElementById('lineView');
        const ringView = document.getElementById('ringView');
        const styleToggleBtn = document.getElementById('styleToggleBtn');
        const timerContainer = document.getElementById('timerContainer');

        function applyStyleUI() {
            if (currentStyle === 'line') {
                ringView.classList.add('hidden');
                lineView.classList.remove('hidden');
                timerContainer.classList.add('style-line');
                styleToggleBtn.textContent = '🔄 Style: Line';
            } else {
                lineView.classList.add('hidden');
                ringView.classList.remove('hidden');
                timerContainer.classList.remove('style-line');
                styleToggleBtn.textContent = '🔄 Style: Ring';
            }
        }

        function toggleStyle() {
            currentStyle = currentStyle === 'ring' ? 'line' : 'ring';
            localStorage.setItem('ttw_style', currentStyle);
            applyStyleUI();
            updateDisplay(isOvertime ? overtimeSeconds : currentSeconds);
        }

        // TIMER LOGIC
        let mainTimer, stopCountUp;
        let initialSeconds = 0, currentSeconds = 0, totalStopSeconds = 0, overtimeSeconds = 0; 
        let isRunning = false, isStopRunning = false, isOvertime = false; 

        const displayLine = document.getElementById('timerDisplayLine');
        const displayRing = document.getElementById('timerDisplayRing');
        const targetStatus = document.getElementById('targetStatus');
        const elapsedStatus = document.getElementById('elapsedStatus');
        const stopStatus = document.getElementById('stopStatus');
        const overtimeRow = document.getElementById('overtimeRow');
        const overtimeStatus = document.getElementById('overtimeStatus');
        const mainStatusPanel = document.getElementById('mainStatusPanel');
        const stopBtn = document.getElementById('stopBtn');
        const progressBar = document.getElementById('progressBar');
        const ringCircle = document.getElementById('ringCircle');
        const ringCircumference = 2 * Math.PI * 90; // 565.48
        
        const setupMode = document.getElementById('setupMode');
        const activeMode = document.getElementById('activeMode');

        window.onload = function() {
            applyStyleUI();

            if(localStorage.getItem('ttw_initial')) {
                initialSeconds = parseInt(localStorage.getItem('ttw_initial')) || 0;
                currentSeconds = parseInt(localStorage.getItem('ttw_current')) || 0;
                totalStopSeconds = parseInt(localStorage.getItem('ttw_stop_seconds')) || 0;
                isOvertime = localStorage.getItem('ttw_is_overtime') === 'true';
                overtimeSeconds = parseInt(localStorage.getItem('ttw_overtime_seconds')) || 0;
                
                switchToActiveMode();
                if (isOvertime) enableOvertimeUI();
                updateDisplay(isOvertime ? overtimeSeconds : currentSeconds);
                updateStatusPanels();

                if(localStorage.getItem('ttw_is_stopped') === 'true') {
                    runStopTimer();
                    updateStopButtonUI(true);
                }
            }
        };

        function setPreset(h, m, s) {
            document.getElementById('hrs').value = h || '';
            document.getElementById('mins').value = m || '';
            document.getElementById('secs').value = s || '';
            startTimer();
        }

        function switchToActiveMode() {
            setupMode.classList.add('hidden');
            activeMode.classList.remove('hidden');
        }

        function switchToSetupMode() {
            activeMode.classList.add('hidden');
            setupMode.classList.remove('hidden');
        }

        function startTimer() {
            if (isRunning) return;
            
            clearInterval(stopCountUp);
            isStopRunning = false;
            localStorage.setItem('ttw_is_stopped', 'false');
            updateStopButtonUI(false);

            if (currentSeconds === 0 && !isOvertime) {
                const hrs = Math.max(0, parseInt(document.getElementById('hrs').value) || 0);
                const mins = Math.max(0, Math.min(59, parseInt(document.getElementById('mins').value) || 0));
                const secs = Math.max(0, Math.min(59, parseInt(document.getElementById('secs').value) || 0));

                currentSeconds = (hrs * 3600) + (mins * 60) + secs;
                initialSeconds = currentSeconds;

                if (currentSeconds <= 0) {
                    alert("කරුණාකර වලංගු කාලයක් ඇතුලත් කරන්න!");
                    return;
                }
                localStorage.setItem('ttw_initial', initialSeconds);
            }

            switchToActiveMode();
            isRunning = true;
            
            mainTimer = setInterval(() => {
                if (!isOvertime) {
                    if (currentSeconds > 0) {
                        currentSeconds--;
                        localStorage.setItem('ttw_current', currentSeconds);
                        updateDisplay(currentSeconds);
                    } else {
                        isOvertime = true;
                        localStorage.setItem('ttw_is_overtime', 'true');
                        enableOvertimeUI();
                    }
                } 
                
                if (isOvertime) {
                    overtimeSeconds++;
                    localStorage.setItem('ttw_overtime_seconds', overtimeSeconds);
                    updateDisplay(overtimeSeconds);
                }

                updateStatusPanels();
            }, 1000);
        }

        function togglePauseResume() {
            if (isRunning) {
                clearInterval(mainTimer);
                isRunning = false;
                runStopTimer();
                updateStopButtonUI(true);
            } else if (isStopRunning) {
                startTimer();
            }
        }

        function updateStopButtonUI(isPaused) {
            if (isPaused) {
                stopBtn.textContent = "Resume";
                stopBtn.style.borderColor = "#00ffcc";
                stopBtn.style.color = "#00ffcc";
            } else {
                stopBtn.textContent = "Pause";
                stopBtn.style.borderColor = "rgba(255, 255, 255, 0.15)";
                stopBtn.style.color = "#fff";
            }
        }

        function runStopTimer() {
            if(isStopRunning) return;
            isStopRunning = true;
            localStorage.setItem('ttw_is_stopped', 'true');

            stopCountUp = setInterval(() => {
                totalStopSeconds++;
                localStorage.setItem('ttw_stop_seconds', totalStopSeconds);
                updateStatusPanels();
            }, 1000);
        }

        function resetTimer() {
            clearInterval(mainTimer);
            clearInterval(stopCountUp);
            isRunning = false;
            isStopRunning = false;
            isOvertime = false;
            
            currentSeconds = 0;
            initialSeconds = 0;
            totalStopSeconds = 0;
            overtimeSeconds = 0;
            
            localStorage.clear();
            localStorage.setItem('ttw_style', currentStyle);

            displayLine.classList.remove('overtime');
            displayRing.classList.remove('overtime');
            mainStatusPanel.classList.remove('overtime-panel');
            overtimeRow.classList.add('hidden');
            
            progressBar.classList.remove('overtime');
            progressBar.style.width = "100%";

            ringCircle.classList.remove('overtime');
            ringCircle.style.strokeDashoffset = "0";

            displayLine.textContent = "00:00:00";
            displayRing.textContent = "00:00:00";
            targetStatus.textContent = "00:00:00";
            elapsedStatus.textContent = "00:00:00";
            stopStatus.textContent = "00:00:00";
            overtimeStatus.textContent = "+00:00:00";
            
            document.getElementById('hrs').value = '';
            document.getElementById('mins').value = '';
            document.getElementById('secs').value = '';

            updateStopButtonUI(false);
            switchToSetupMode();
        }

        function enableOvertimeUI() {
            displayLine.classList.add('overtime');
            displayRing.classList.add('overtime');
            mainStatusPanel.classList.add('overtime-panel');
            overtimeRow.classList.remove('hidden');
            progressBar.classList.add('overtime');
            ringCircle.classList.add('overtime');
        }

        function formatTime(secs) {
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateDisplay(secs) {
            const formatted = (isOvertime ? "+" : "") + formatTime(secs);
            displayLine.textContent = formatted;
            displayRing.textContent = formatted;
            
            if (!isOvertime && initialSeconds > 0) {
                const ratio = currentSeconds / initialSeconds;
                
                // Line bar update
                progressBar.style.width = `${ratio * 100}%`;

                // Ring circle update
                const offset = ringCircumference - (ratio * ringCircumference);
                ringCircle.style.strokeDashoffset = offset;
            } else if (isOvertime) {
                ringCircle.style.strokeDashoffset = 0;
            }
        }

        function updateStatusPanels() {
            targetStatus.textContent = formatTime(initialSeconds);
            const elapsed = (initialSeconds - currentSeconds) + overtimeSeconds;
            elapsedStatus.textContent = formatTime(elapsed);
            stopStatus.textContent = formatTime(totalStopSeconds);
            if (isOvertime) overtimeStatus.textContent = "+" + formatTime(overtimeSeconds);
        }
    </script>
</body>
</html>
