<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTW - Time to Work</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');

        /* Dynamic & Premium Background Decoration */
        body {
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(241, 196, 15, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(241, 196, 15, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Glowing background blobs */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(241, 196, 15, 0.08) 0%, transparent 70%);
            top: 10%;
            left: 15%;
            z-index: -1;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(231, 76, 60, 0.05) 0%, transparent 70%);
            bottom: 10%;
            right: 15%;
            z-index: -1;
            pointer-events: none;
        }

        h1 {
            color: #f1c40f;
            letter-spacing: 4px;
            margin-bottom: 25px;
            font-size: 36px;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
        }

        .timer-container {
            background-color: rgba(0, 0, 0, 0.85);
            border: 2px solid #222;
            border-radius: 25px;
            padding: 40px 50px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 30px rgba(241, 196, 15, 0.03);
            text-align: center;
            max-width: 750px;
            width: 95%;
            backdrop-filter: blur(10px);
        }

        /* Animation smooth වෙන්න දාපු කොටස */
        .fade-element {
            transition: all 0.4s ease-in-out;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            color: #555;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .display {
            font-family: 'Digital Numbers', sans-serif;
            font-size: 85px;
            color: #ffffff;
            margin: 15px 0 30px 0;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.25);
        }

        .inputs-section {
            margin: 30px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .inputs-section input {
            width: 85px;
            padding: 15px;
            background: #111;
            border: 2px solid #333;
            color: #fff;
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .inputs-section input:focus {
            border-color: #f1c40f;
            background: #151515;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.2);
            outline: none;
        }

        .controls button {
            background-color: #151515;
            color: #fff;
            border: 2px solid #444;
            padding: 14px 45px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .controls button:hover {
            background-color: #f1c40f;
            color: #000;
            border-color: #f1c40f;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }

        #stopBtn:hover {
            background-color: #e74c3c;
            border-color: #e74c3c;
            color: #fff;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
        }

        #resetBtn:hover {
            background-color: #7f8c8d;
            border-color: #7f8c8d;
            color: #fff;
            box-shadow: 0 0 15px rgba(127, 140, 141, 0.4);
        }

        .status-panel {
            margin-top: 35px;
            background: rgba(10, 10, 10, 0.9);
            padding: 25px;
            border-radius: 15px;
            border-left: 6px solid #f1c40f;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1c1c1c;
            padding-bottom: 10px;
        }

        .status-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .status-label {
            color: #aaa;
            font-size: 16px;
            font-weight: 500;
        }

        .status-value {
            font-family: 'Digital Numbers', sans-serif;
            font-size: 28px;
            color: #ffffff;
            letter-spacing: 2px;
        }

        .status-row:nth-child(2) .status-value {
            color: #2ecc71;
            text-shadow: 0 0 8px rgba(46, 204, 113, 0.2);
        }

        .status-row:nth-child(3) {
            border-left-color: #e74c3c;
        }
        
        .status-row:nth-child(3) .status-value {
            color: #e74c3c;
            text-shadow: 0 0 8px rgba(231, 76, 60, 0.2);
        }
    </style>
</head>
<body>

    <h1>TTW - Time to Work</h1>

    <div class="timer-container">
        
        <!-- සඟවන/පෙන්වන Input සෙක්ෂන් එක -->
        <div id="setupMode" class="fade-element">
            <h2 style="color: #666; font-size: 18px; margin-bottom: 10px; font-weight: normal; letter-spacing: 1px;">SET TARGET TIME</h2>
            <div class="inputs-section">
                <input type="number" id="hrs" placeholder="HH" min="0" max="99">
                <input type="number" id="mins" placeholder="MM" min="0" max="59">
                <input type="number" id="secs" placeholder="SS" min="0" max="59">
            </div>
            <div class="controls">
                <button id="startInitialBtn" onclick="startTimer()">Start Timer</button>
            </div>
        </div>

        <!-- ටයිමරය ක්‍රියාත්මක වන විට මතුවන Active සෙක්ෂන් එක -->
        <div id="activeMode" class="fade-element hidden">
            <div class="labels">
                <span>Hours</span>
                <span>Minutes</span>
                <span>Seconds</span>
            </div>
            
            <div class="display" id="timerDisplay">00:00:00</div>

            <div class="controls">
                <button id="startBtn" onclick="startTimer()">Start</button>
                <button id="stopBtn" onclick="stopTimer()">Stop</button>
                <button id="resetBtn" onclick="resetTimer()">Reset</button>
            </div>

            <div class="status-panel">
                <div class="status-row">
                    <span class="status-label">Target Time Set</span>
                    <span class="status-value" id="targetStatus">00:00:00</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Total Elapsed Time (ගත වූ කාලය)</span>
                    <span class="status-value" id="elapsedStatus">00:00:00</span>
                </div>
                <div class="status-row">
                    <span class="status-label" style="color: #ef5350;">Total Stop Time (නතර කර සිටි කාලය)</span>
                    <span class="status-value" id="stopStatus">00:00:00</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        let countdown;
        let stopCountUp;
        let totalSeconds = 0;
        let initialSeconds = 0;
        let totalStopSeconds = 0; 
        let isRunning = false;
        let isStopRunning = false; 

        const display = document.getElementById('timerDisplay');
        const targetStatus = document.getElementById('targetStatus');
        const elapsedStatus = document.getElementById('elapsedStatus');
        const stopStatus = document.getElementById('stopStatus');
        
        const setupMode = document.getElementById('setupMode');
        const activeMode = document.getElementById('activeMode');

        window.onload = function() {
            // කලින් දත්ත තිබේ නම් කෙලින්ම Active Mode එක පෙන්වන්න
            if(localStorage.getItem('ttw_remaining')) {
                totalSeconds = parseInt(localStorage.getItem('ttw_remaining'));
                initialSeconds = parseInt(localStorage.getItem('ttw_initial'));
                totalStopSeconds = parseInt(localStorage.getItem('ttw_stop_seconds')) || 0;
                
                switchToActiveMode();
                updateDisplay(totalSeconds);
                updateStatusPanels();

                if(localStorage.getItem('ttw_is_stopped') === 'true') {
                    runStopTimer();
                }
            }
        };

        function switchToActiveMode() {
            setupMode.classList.add('hidden');
            activeMode.classList.remove('hidden');
        }

        function switchToSetupMode() {
            activeMode.classList.add('hidden');
            setupMode.classList.remove('hidden');
        }

        function startTimer() {
            if (isRunning) return;
            
            clearInterval(stopCountUp);
            isStopRunning = false;
            localStorage.setItem('ttw_is_stopped', 'false');

            if (totalSeconds === 0) {
                const hrs = parseInt(document.getElementById('hrs').value) || 0;
                const mins = parseInt(document.getElementById('mins').value) || 0;
                const secs = parseInt(document.getElementById('secs').value) || 0;

                totalSeconds = (hrs * 3600) + (mins * 60) + secs;
                initialSeconds = totalSeconds;

                if (totalSeconds <= 0) {
                    alert("කරුණාකර වෙලාවක් ඇතුලත් කරන්න!");
                    return;
                }
            }

            // Inputs සඟවා ටයිමරය මතු කිරීම
            switchToActiveMode();

            isRunning = true;
            localStorage.setItem('ttw_initial', initialSeconds);
            
            countdown = setInterval(() => {
                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    isRunning = false;
                    alert("Time's Up!");
                    resetTimer();
                } else {
                    totalSeconds--;
                    localStorage.setItem('ttw_remaining', totalSeconds);
                    updateDisplay(totalSeconds);
                    updateStatusPanels();
                }
            }, 1000);
        }

        function stopTimer() {
            if (isRunning || (!isRunning && totalSeconds > 0 && !isStopRunning)) {
                clearInterval(countdown);
                isRunning = false;
                runStopTimer();
            }
        }

        function runStopTimer() {
            if(isStopRunning) return;
            isStopRunning = true;
            localStorage.setItem('ttw_is_stopped', 'true');

            stopCountUp = setInterval(() => {
                totalStopSeconds++;
                localStorage.setItem('ttw_stop_seconds', totalStopSeconds);
                updateStatusPanels();
            }, 1000);
        }

        function resetTimer() {
            clearInterval(countdown);
            clearInterval(stopCountUp);
            isRunning = false;
            isStopRunning = false;
            totalSeconds = 0;
            initialSeconds = 0;
            totalStopSeconds = 0;
            
            localStorage.removeItem('ttw_remaining');
            localStorage.removeItem('ttw_initial');
            localStorage.removeItem('ttw_stop_seconds');
            localStorage.setItem('ttw_is_stopped', 'false');

            display.textContent = "00:00:00";
            targetStatus.textContent = "00:00:00";
            elapsedStatus.textContent = "00:00:00";
            stopStatus.textContent = "00:00:00";
            
            document.getElementById('hrs').value = '';
            document.getElementById('mins').value = '';
            document.getElementById('secs').value = '';

            // Reset කල පසු නැවත Input Mode එකට මාරු කිරීම
            switchToSetupMode();
        }

        function updateDisplay(secs) {
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            display.textContent = `${h}:${m}:${s}`;
        }

        function formatTime(secs) {
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateStatusPanels() {
            targetStatus.textContent = formatTime(initialSeconds);
            const elapsed = initialSeconds - totalSeconds;
            elapsedStatus.textContent = formatTime(elapsed);
            stopStatus.textContent = formatTime(totalStopSeconds);
        }
    </script>
</body>
</html>
